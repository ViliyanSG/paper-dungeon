name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    name: Export game
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp build version
        run: sed -i 's/GAME_VERSION := "dev"/GAME_VERSION := "${{ github.run_number }}"/' main.gd

      - name: Remove Android preset (desktop job only)
        run: sed -i '/^\[preset\.2\]/,$d' export_presets.cfg

      - name: Export (Windows + Linux)
        id: export
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: true
          cache: true

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          allowUpdates: true
          tag: v1.0.${{ github.run_number }}
          artifacts: ${{ steps.export.outputs.archive_directory }}/*
          token: ${{ secrets.GITHUB_TOKEN }}

  android:
    name: Export Android
    needs: export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp build version
        run: sed -i 's/GAME_VERSION := "dev"/GAME_VERSION := "${{ github.run_number }}"/' main.gd

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.3.stable ~/.local/share/godot/export_templates/4.3.stable || true

      - name: Create debug keystore
        run: keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999 -deststoretype pkcs12

      - name: Configure Godot Android settings
        run: |
          mkdir -p ~/.config/godot
          {
            echo '[gd_resource type="EditorSettings" format=3]'
            echo '[resource]'
            echo "export/android/android_sdk_path = \"$ANDROID_HOME\""
            echo "export/android/java_sdk_path = \"${JAVA_HOME:-/usr/lib/jvm/java-17-openjdk-amd64}\""
            echo "export/android/debug_keystore = \"$(pwd)/debug.keystore\""
            echo 'export/android/debug_keystore_user = "androiddebugkey"'
            echo 'export/android/debug_keystore_pass = "android"'
          } > ~/.config/godot/editor_settings-4.tres

      - name: Install Android SDK build tools 34
        run: |
          SDKM=$(find "$ANDROID_HOME" -name sdkmanager -type f 2>/dev/null | head -1)
          echo "sdkmanager: $SDKM"
          yes | "$SDKM" --licenses 2>&1 | tail -2 || true
          yes | "$SDKM" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -2 || true

      - name: Install Android build template
        run: |
          mkdir -p android/build
          unzip -o ~/.local/share/godot/export_templates/4.3.stable/android_source.zip -d android/build > /dev/null
          echo -n "4.3.stable" > android/.build_version
          touch android/.gdignore

      - name: Export APK
        run: |
          mkdir -p build/android
          godot --headless --path . --import || true
          godot --headless --path . --export-debug "Android" build/android/PaperDungeon.apk
          ls -la build/android/PaperDungeon.apk

      - name: Upload APK to release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: v1.0.${{ github.run_number }}
          artifacts: build/android/PaperDungeon.apk
          token: ${{ secrets.GITHUB_TOKEN }}

  itch:
    name: Publish to itch.io
    needs: [export, android]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "v1.0.${{ github.run_number }}" \
            --repo "${{ github.repository }}" -D dist
          ls -la dist

      - name: Install butler
        run: |
          curl -sL -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip
          chmod +x butler
          ./butler -V

      - name: Push builds to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCH_TARGET: ${{ vars.ITCH_TARGET }}
        run: |
          if [ -z "$BUTLER_API_KEY" ] || [ -z "$ITCH_TARGET" ]; then
            echo "itch.io not configured yet (need BUTLER_API_KEY secret + ITCH_TARGET variable) — skipping."
            exit 0
          fi
          VER="1.0.${{ github.run_number }}"
          for f in dist/*; do
            base=$(basename "$f")
            case "$base" in
              *[Ww]indows*) ch=windows ;;
              *[Ll]inux*)   ch=linux ;;
              *.apk)        ch=android ;;
              *) echo "skip $base"; continue ;;
            esac
            echo "Pushing $base -> $ITCH_TARGET:$ch"
            ./butler push "$f" "$ITCH_TARGET:$ch" --userversion "$VER"
          done
